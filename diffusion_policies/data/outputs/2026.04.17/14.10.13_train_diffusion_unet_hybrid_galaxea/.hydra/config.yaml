task:
  name: galaxea
  task_name: galaxea
  shape_meta:
    obs:
      point_cloud:
        shape:
        - 1024
        - 3
        type: point_cloud
      agent_pos:
        shape:
        - 7
        type: low_dim
    action:
      shape:
      - 7
  env_runner: null
  dataset:
    _target_: diffusion_policies.dataset.galaxea_a1.GalaxeaA1Dataset
    zarr_path: /home/luka/Haoyang/Demogen/DemoGen/data/datasets/source_demos/pick_fruits_25.zarr
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1'}
    pad_after: ${eval:'${n_action_steps}-1'}
    seed: 42
    val_ratio: 0.02
    max_train_episodes: 90
name: train_diffusion_unet_hybrid
_target_: diffusion_policies.workspace.train_diffusion_unet_hybrid_pointcloud_workspace.TrainDiffusionUnetHybridPointcloudWorkspace
task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: debug
horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: true
policy:
  _target_: diffusion_policies.policy.diffusion_unet_hybrid_pointcloud_policy.DiffusionUnetHybridPointcloudPolicy
  use_point_crop: true
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  diffusion_step_embed_dim: 128
  down_dims:
  - 512
  - 1024
  - 2048
  crop_shape:
  - 80
  - 80
  encoder_output_dim: 128
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 200
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: true
    set_alpha_to_one: true
    steps_offset: 0
    prediction_type: sample
  num_inference_steps: 20
  obs_as_global_cond: true
  shape_meta: ${shape_meta}
  use_pc_color: false
  pointnet_type: pointnet
  se3_augmentation_cfg:
    use_aug: true
    rotation: true
    rotation_angle:
    - 0.05
    - 0.05
    - 0.05
    translation: true
    translation_scale: 0.005
    jitter: true
    jitter_scale: 0.005
  pointcloud_encoder_cfg:
    in_channels: 3
    out_channels: ${policy.encoder_output_dim}
    use_layernorm: true
    final_norm: layernorm
    normal_channel: false
ema:
  _target_: diffusion_policies.model_dp3.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999
dataloader:
  batch_size: 32
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: false
val_dataloader:
  batch_size: 32
  num_workers: 8
  shuffle: false
  pin_memory: true
  persistent_workers: false
optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0001
  betas:
  - 0.95
  - 0.999
  eps: 1.0e-08
  weight_decay: 1.0e-06
training:
  device: cuda:0
  seed: 42
  debug: false
  resume: false
  lr_scheduler: constant_with_warmup
  lr_warmup_steps: 1000
  num_epochs: 3000
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 1000000
  checkpoint_every: null
  val_every: 10
  sample_every: 10
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  save_video: false
eval:
  n_gpu: 1
  n_cpu_per_gpu: 2
  save_video: true
  eval_mode: eval
  source_dataset: null
logging:
  project: spatial_generalization
  group: dp3
  entity: 1169129227-nanyang-technological-university-singapore
  name: ${exp_name}
  id: ${now:%Y.%m.%d-%H.%M.%S}_${exp_name}
  mode: online
  resume: false
  tags:
  - ${exp_name}
  - ${task_name}
  - dp3
checkpoint:
  save_ckpt: true
  topk:
    monitor_key: train_loss
    mode: min
    k: 5
    format_str: epoch={epoch:04d}-train_loss={train_loss:.3f}.ckpt
  save_last_ckpt: true
  save_last_snapshot: false
multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
